<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚓ Ship Battle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #app {
    position: relative;
    width: 900px;
    max-width: 100vw;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    border: 2px solid #2a6a7a;
    box-shadow: 0 0 40px #2ab0d033, 0 0 80px #2ab0d011;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    gap: 16px;
    padding: 30px;
    pointer-events: all;
  }
  .screen.hidden { display: none; }

  .title {
    font-size: clamp(18px, 4vw, 36px);
    color: #00ff41;
    text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff4180;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.4;
  }
  .subtitle {
    font-size: clamp(6px, 1.2vw, 11px);
    color: #4a8a4a;
    text-align: center;
    line-height: 2;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.5vw, 13px);
    padding: 14px 28px;
    background: transparent;
    border: 2px solid #00ff41;
    color: #00ff41;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.15s;
    pointer-events: all;
  }
  .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; color: #00ff41; box-shadow: none; }
  .btn.red { border-color: #ff4141; color: #ff4141; }
  .btn.red:hover { background: #ff4141; color: #000; box-shadow: 0 0 20px #ff4141; }

  input[type=text] {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.2vw, 11px);
    background: #0a140a;
    border: 2px solid #2a5a2a;
    color: #00ff41;
    padding: 10px 16px;
    width: 240px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
  }
  input[type=text]:focus { border-color: #00ff41; box-shadow: 0 0 10px #00ff4140; }

  /* Lobby player list */
  #lobbyList {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 320px;
    max-height: 160px;
    overflow-y: auto;
  }
  .lobby-player {
    font-size: clamp(7px, 1vw, 9px);
    padding: 7px 12px;
    border-left: 3px solid #00ff41;
    background: rgba(0,255,65,0.05);
    color: #00ff41;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lobby-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* HUD */
  #hud {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    gap: 10px;
  }
  .hud-box {
    background: rgba(0,0,0,0.7);
    border: 1px solid #1a3a1a;
    padding: 8px 12px;
    font-size: clamp(5px, 0.9vw, 9px);
    color: #00ff41;
    line-height: 1.8;
    min-width: 130px;
  }
  .hud-box .label { color: #4a8a4a; font-size: 0.85em; }
  .health-bar-wrap { width: 100%; height: 6px; background: #1a1a1a; margin-top: 4px; }
  .health-bar { height: 100%; background: #00ff41; transition: width 0.1s; }
  .health-bar.low { background: #ff4141; }
  .health-bar.mid { background: #ffaa00; }
  .powerup-slot {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1px solid #4a8a4a;
    text-align: center;
    line-height: 14px;
    font-size: 10px;
    margin-right: 3px;
  }
  .powerup-slot.active { border-color: #00ff41; box-shadow: 0 0 6px #00ff41; }

  /* Scoreboard */
  #scoreboard {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #1a3a1a;
    padding: 8px 12px;
    pointer-events: none;
    min-width: 140px;
  }
  .sb-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: clamp(5px, 0.75vw, 7px);
    color: #4a8a4a;
    margin-bottom: 3px;
  }
  .sb-row.me { color: #00ff41; }
  .sb-row.dead { text-decoration: line-through; opacity: 0.4; }
  .sb-name { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #kill-feed {
    position: absolute;
    bottom: 28px; left: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
  }
  .kill-msg {
    font-size: clamp(5px, 0.8vw, 8px);
    color: #ffaa00;
    background: rgba(0,0,0,0.7);
    padding: 4px 8px;
    border-left: 2px solid #ffaa00;
    animation: fadeOut 3s forwards;
  }
  @keyframes fadeOut { 0%,70%{opacity:1} 100%{opacity:0} }

  #controls-hint {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(5px, 0.7vw, 7px);
    color: #2a5a2a;
    white-space: nowrap;
    pointer-events: none;
  }

  #conn-status {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: 6px;
    color: #2a5a2a;
    pointer-events: none;
  }
  #conn-status.ok  { color: #00ff41; }
  #conn-status.err { color: #ff4141; }

  .divider { width: 200px; height: 1px; background: #1a3a1a; }
  .error-msg { font-size: 8px; color: #ff4141; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <canvas id="c" width="900" height="600"></canvas>
  <div id="ui">

    <!-- JOIN SCREEN -->
    <div class="screen" id="joinScreen">
      <div class="title">⚓ SHIP<br>BATTLE</div>
      <div class="subtitle">MULTIPLAYER · UP TO 8 PLAYERS</div>
      <div class="divider"></div>
      <input type="text" id="nameInput" placeholder="YOUR SHIP NAME" maxlength="12" autocomplete="off">
      <button class="btn" id="btnJoin">⚓ JOIN GAME</button>
      <div class="error-msg" id="joinError"></div>
      <div class="subtitle" style="font-size:6px;color:#2a5a2a">
        WASD / ARROWS — MOVE &amp; AIM<br>
        SPACE — FIRE · 1-3 — POWER-UP
      </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div class="screen hidden" id="lobbyScreen">
      <div class="title" style="font-size:clamp(14px,2.5vw,24px)">⚓ LOBBY</div>
      <div class="subtitle" id="lobbyStatus">Waiting for players…</div>
      <div id="lobbyList"></div>
      <button class="btn" id="btnStart" disabled>▶ START GAME</button>
      <div class="subtitle" style="font-size:6px;color:#2a5a2a">
        NEED AT LEAST 2 PLAYERS · HOST CLICKS START
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen hidden" id="gameOverScreen">
      <div class="title" id="goTitle">GAME OVER</div>
      <div class="subtitle" id="goStats"></div>
      <button class="btn" id="btnReplay">▶ BACK TO LOBBY</button>
    </div>

    <!-- WIN SCREEN -->
    <div class="screen hidden" id="winScreen">
      <div class="title" style="color:#ffaa00;text-shadow:0 0 10px #ffaa00">🏆 VICTORY!</div>
      <div class="subtitle" id="winStats"></div>
      <button class="btn" id="btnWinLobby">▶ BACK TO LOBBY</button>
    </div>

    <!-- HUD -->
    <div id="hud" style="display:none">
      <div class="hud-box">
        <div class="label">CAPTAIN</div>
        <div id="hudName">—</div>
        <div class="label" style="margin-top:4px">HEALTH</div>
        <div class="health-bar-wrap"><div class="health-bar" id="hudHP" style="width:100%"></div></div>
        <div id="hudHPVal" style="margin-top:2px">100 / 100</div>
        <div class="label" style="margin-top:6px">POWER-UPS</div>
        <div id="hudPU">—</div>
      </div>
    </div>

    <div id="scoreboard" style="display:none"></div>
    <div id="kill-feed"></div>
    <div id="controls-hint">W/↑ FORWARD · A/D ROTATE · SPACE FIRE · 1-3 POWER-UP</div>
    <div id="conn-status">CONNECTING…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const W = 900, H = 600;
const PS = 5;
const MAX_HP = 100;

const COLORS = [
  '#00cc33','#cc3300','#cc6600','#9900cc',
  '#0066cc','#cc0066','#00aacc','#aacc00',
];

const PAL = {
  // ocean
  waterDeep:'#0e3b52',
  waterMid: '#1a5e7d',
  waterShallow:'#2a85a8',
  foam:     '#eaf7f8',
  foamDim:  '#bfe6ec',
  // sky elements floating over the water
  cloud:    '#13384a',
  cloudLite:'#1c4a60',
  gull:     '#0a1f2a',
  bullet:   '#ffee00',
  bulletGlow:'#ff880080',
  hp100:'#00ff41', hp50:'#ffaa00', hp25:'#ff4141',
  powerup: { shield:'#44aaff', rapid:'#ffaa00', triple:'#ff44aa' },
  explosion:['#ff4400','#ff8800','#ffcc00','#ffffff'],
  // medieval ship palette
  hullDark: '#3c2414',
  hull:     '#6b4423',
  hullLite: '#8a5c33',
  deck:     '#caa05c',
  mast:     '#2a1a0d',
  sail:     '#f4efe0',
  sailShade:'#d8d0ba',
  flagpole: '#1a1008',
};

const PU_ICONS  = { shield:'🛡', rapid:'⚡', triple:'🔱' };

// Build a 13×9 pixel-grid medieval ship: flat stern (left), tapered
// pointed bow (right), wooden hull, deck, square sail amidships and a
// mast-top flag tile (recolored per-player / per-team in drawShipSprite).
function buildShipRows() {
  const COLS = 13, MIDROW = 4, STERN_COL = 2;
  const grid = [];
  for (let r = 0; r < 9; r++) grid.push(new Array(COLS).fill(' '));

  for (let r = 0; r < 9; r++) {
    const d = Math.abs(r - MIDROW);          // distance from centerline
    const bowCol = (COLS - 1) - d * 2;        // tapers to a point at the bow
    if (bowCol < STERN_COL) continue;
    for (let c = STERN_COL; c <= bowCol; c++) {
      const edge = (c === STERN_COL || c === bowCol || r === 0 || r === 8);
      grid[r][c] = edge ? 'H' : 'D';           // H = hull edge, D = deck
    }
  }
  // square sail amidships
  for (let r = MIDROW - 2; r <= MIDROW + 2; r++) {
    for (let c = 5; c <= 8; c++) {
      if (grid[r] && grid[r][c] === 'D') grid[r][c] = 'S';
    }
  }
  // mast + flag tile
  if (grid[MIDROW][7] !== ' ') grid[MIDROW][7] = 'M';
  if (grid[MIDROW - 3] ) grid[MIDROW][6] = 'M';
  grid[MIDROW][9] = 'F';
  // bow cannon tip
  for (let r = MIDROW + 1; r >= MIDROW - 1; r--) {
    const d = Math.abs(r - MIDROW);
    const bowCol = (COLS - 1) - d * 2;
    if (grid[r] && grid[r][bowCol] !== undefined) { grid[r][bowCol] = 'C'; break; }
  }
  return grid.map(row => row.join(''));
}
const SHIP_ROWS = buildShipRows();

// ══════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ══════════════════════════════════════════════
//  CLIENT STATE
// ══════════════════════════════════════════════
let myId       = null;
let gameState  = null;   // latest state from server
let keysDown   = {};
let animId     = null;
let waterCanvas= null;
let waterFrame = 0;
let particles  = [];
let trails     = {};     // shipId → [{x,y,age}]
let isHost     = false;  // first player to join becomes host

// ══════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════
const WS_URL = location.protocol === 'https:'
  ? 'wss://' + location.host
  : 'ws://'  + location.host;

let ws = null;
let reconnectTimer = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnStatus('ONLINE', 'ok');
    clearTimeout(reconnectTimer);
  };

  ws.onclose = () => {
    setConnStatus('DISCONNECTED', 'err');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setConnStatus('ERROR', 'err');
  };

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMsg(msg);
  };
}

function send(obj) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

function setConnStatus(text, cls) {
  const el = document.getElementById('conn-status');
  el.textContent = text;
  el.className = cls;
}

// ══════════════════════════════════════════════
//  MESSAGE HANDLER
// ══════════════════════════════════════════════
function handleMsg(msg) {
  if (msg.type === 'joined') {
    myId = msg.id;
    // First player is host
    if (!isHost) isHost = true;
  }

  else if (msg.type === 'lobby') {
    showScreen('lobbyScreen');
    stopLoop();
    renderLobby(msg);
  }

  else if (msg.type === 'start') {
    gameState = { ships: msg.ships, bullets: [], powerups: [], frame: 0 };
    trails = {};
    particles = [];
    showScreen(null);
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('scoreboard').style.display = 'block';
    buildWaterCanvas();
    startLoop();
    const me = msg.ships.find(s => s.id === myId);
    if (me) document.getElementById('hudName').textContent = me.name;
  }

  else if (msg.type === 'state') {
    if (!gameState) return;
    gameState.ships    = msg.ships;
    gameState.bullets  = msg.bullets;
    gameState.powerups = msg.powerups;
    gameState.frame    = msg.frame;
  }

  else if (msg.type === 'gameOver') {
    stopLoop();
    document.getElementById('hud').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'none';

    if (msg.winnerId === myId) {
      const me = msg.ships?.find(s => s.id === myId);
      document.getElementById('winStats').textContent =
        me ? `KILLS: ${me.kills}  SHOTS: ${me.shots}` : '';
      showScreen('winScreen');
    } else {
      document.getElementById('goTitle').textContent =
        msg.winner ? `${msg.winner} WINS!` : 'DRAW!';
      const me = msg.ships?.find(s => s.id === myId);
      document.getElementById('goStats').textContent =
        me ? `YOUR KILLS: ${me.kills}  SHOTS: ${me.shots}` : '';
      showScreen('gameOverScreen');
    }
  }

  else if (msg.type === 'killMsg') {
    addKillMsg(msg.msg, msg.color || '#ffaa00');
  }

  else if (msg.type === 'error') {
    document.getElementById('joinError').textContent = msg.msg;
  }
}

// ══════════════════════════════════════════════
//  LOBBY
// ══════════════════════════════════════════════
function renderLobby(msg) {
  const list = document.getElementById('lobbyList');
  list.innerHTML = '';
  msg.players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'lobby-player';
    const dot = document.createElement('div');
    dot.className = 'lobby-dot';
    dot.style.background = COLORS[p.colorIdx] || '#00ff41';
    row.appendChild(dot);
    row.appendChild(document.createTextNode(p.name + (p.id === myId ? ' (YOU)' : '')));
    list.appendChild(row);
  });

  const status = document.getElementById('lobbyStatus');
  const count  = msg.players.length;
  status.textContent = `${count} / 8 PLAYERS · NEED ${Math.max(0, msg.minPlayers - count)} MORE`;

  const btnStart = document.getElementById('btnStart');
  btnStart.disabled = count < msg.minPlayers;
}

// ══════════════════════════════════════════════
//  WATER
// ══════════════════════════════════════════════
function buildWaterCanvas() {
  const oc  = document.createElement('canvas');
  oc.width  = W; oc.height = H;
  const oc2 = oc.getContext('2d');
  // base ocean gradient, banded in chunky pixel steps (not smooth) to
  // keep the retro pixel-art look
  const bands = 24;
  for (let i = 0; i < bands; i++) {
    const t = i / (bands - 1);
    oc2.fillStyle = t < 0.5
      ? PAL.waterDeep
      : (t < 0.8 ? PAL.waterMid : PAL.waterShallow);
    oc2.fillRect(0, Math.floor(i * H / bands), W, Math.ceil(H / bands) + 1);
  }
  // speckled pixel dither for texture
  oc2.fillStyle = 'rgba(255,255,255,0.04)';
  for (let i = 0; i < 900; i++) {
    const x = Math.floor(Math.random() * W / PS) * PS;
    const y = Math.floor(Math.random() * H / PS) * PS;
    oc2.fillRect(x, y, PS, PS);
  }
  waterCanvas = oc;
}

function drawWater(frame) {
  ctx.drawImage(waterCanvas, 0, 0);

  // animated foam wave-lines, drifting sideways in staggered rows
  for (let y = 16; y < H; y += 36) {
    const offset = Math.sin(frame * 0.035 + y * 0.04) * 8;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = PAL.foamDim;
    for (let x = 0; x < W; x += 24) {
      const wx = (x + offset + frame * 0.4) % W;
      ctx.fillRect(Math.round(wx), y, PS*2, PS/2);
    }
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = PAL.foam;
    for (let x = 12; x < W; x += 24) {
      const wx = (x - offset*1.4 + frame * 0.25) % W;
      ctx.fillRect(Math.round(wx), y + 10, PS, PS/2);
    }
  }
  ctx.globalAlpha = 1;
}

// ══════════════════════════════════════════════
//  CLOUDS  (drifting shadows cast on the water)
// ══════════════════════════════════════════════
const CLOUD_DEFS = [
  { y: 70,  speed: 0.18, scale: 1.4, phase: 0   },
  { y: 220, speed: 0.11, scale: 1.0, phase: 240 },
  { y: 380, speed: 0.22, scale: 1.7, phase: 480 },
  { y: 500, speed: 0.14, scale: 1.1, phase: 700 },
];
function drawClouds(frame) {
  ctx.globalAlpha = 0.16;
  for (const c of CLOUD_DEFS) {
    const span = W + 220;
    const x = ((frame * c.speed + c.phase) % span) - 110;
    const s = c.scale;
    ctx.fillStyle = PAL.cloud;
    // chunky pixel "cumulus" cluster, built from a few overlapping blocks
    const blocks = [
      [0, 0, 60, 18], [14, -8, 40, 16], [34, 4, 36, 14],
      [-10, 6, 30, 12], [50, 8, 26, 10],
    ];
    for (const [bx, by, bw, bh] of blocks) {
      ctx.fillRect(
        Math.round(x + bx*s), Math.round(c.y + by*s),
        Math.round(bw*s/PS)*PS, Math.round(bh*s/PS)*PS
      );
    }
  }
  ctx.globalAlpha = 1;
}

// ══════════════════════════════════════════════
//  SEAGULLS  (small flying pixel sprites overhead)
// ══════════════════════════════════════════════
const GULL_DEFS = [
  { speed: 1.1, ampl: 30, baseY: 90,  phase: 0   },
  { speed: 0.8, ampl: 18, baseY: 160, phase: 900 },
  { speed: 1.4, ampl: 24, baseY: 60,  phase: 1700 },
];
function drawSeagulls(frame) {
  ctx.fillStyle = PAL.gull;
  for (const g of GULL_DEFS) {
    const span = W + 160;
    const t = (frame * g.speed + g.phase) % span;
    const x = t - 80;
    const y = g.baseY + Math.sin(frame * 0.05 + g.phase) * g.ampl * 0.2;
    const flap = Math.sin(frame * 0.35 + g.phase) > 0 ? 4 : 1; // wing up/down
    // tiny pixel "M" / gull-wing silhouette
    ctx.fillRect(Math.round(x), Math.round(y), PS, PS);
    ctx.fillRect(Math.round(x) - PS*2, Math.round(y) - flap, PS*2, PS);
    ctx.fillRect(Math.round(x) + PS,   Math.round(y) - flap, PS*2, PS);
  }
}

// ══════════════════════════════════════════════
//  SHIP DRAWING
// ══════════════════════════════════════════════
function drawShipSprite(cx, cy, angle, hullColor, isMe, frame) {
  const cannonColor = isMe ? '#00ff41' : '#ffffff';
  const flutter = Math.sin(frame * 0.12) * 1; // sail/flag flutter offset
  const rows = SHIP_ROWS;
  const cols = rows[0].length;
  const rLen = rows.length;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const ox = -(cols * PS) / 2;
  const oy = -(rLen * PS) / 2;
  for (let r = 0; r < rLen; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = rows[r][c];
      const x = ox + c*PS, y = oy + r*PS;
      if (ch === 'H') {
        ctx.fillStyle = PAL.hullDark;
        ctx.fillRect(x, y, PS, PS);
      } else if (ch === 'D') {
        ctx.fillStyle = PAL.deck;
        ctx.fillRect(x, y, PS, PS);
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(x + PS - 1, y, 1, PS);
      } else if (ch === 'S') {
        // white sail, with a subtle flutter-shaded trailing edge
        ctx.fillStyle = PAL.sail;
        ctx.fillRect(x, y, PS, PS);
        ctx.fillStyle = PAL.sailShade;
        ctx.fillRect(x, y + PS - 1, PS, 1);
      } else if (ch === 'M') {
        ctx.fillStyle = PAL.mast;
        ctx.fillRect(x, y, PS, PS);
      } else if (ch === 'F') {
        // pirate-style flag, colored per ship, flutters at the masthead
        ctx.fillStyle = hullColor;
        ctx.fillRect(x, y - Math.round(flutter), PS, PS - 1);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(x + 1, y - Math.round(flutter) + 1, 1, 1); // tiny skull-mark fleck
      } else if (ch === 'C') {
        ctx.fillStyle = cannonColor;
        ctx.fillRect(x, y, PS, PS);
      }
    }
  }
  // accent stripe along the hull side, tinted with the player's color
  ctx.fillStyle = hullColor;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(ox + 2*PS, oy + (4)*PS, PS, PS);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawShip(ship, frame) {
  if (ship.dead) return;
  const isMe = ship.id === myId;
  const color = COLORS[ship.colorIdx] || '#888';

  // Trail
  if (!trails[ship.id]) trails[ship.id] = [];
  const trail = trails[ship.id];
  trail.push({ x: ship.x, y: ship.y, age: 0 });
  if (trail.length > 14) trail.shift();
  for (const t of trail) t.age++;

  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    ctx.globalAlpha = (i / trail.length) * 0.25;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.round(t.x)-1, Math.round(t.y)-1, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Shield
  if (ship.activeShield > 0) {
    const pulse = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = pulse * 0.4;
    ctx.strokeStyle = PAL.powerup.shield;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(Math.round(ship.x), Math.round(ship.y), 22, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  drawShipSprite(Math.round(ship.x), Math.round(ship.y), ship.angle, color, isMe, frame);

  // Health bar
  const bw = 36, bh = 4;
  const bx = Math.round(ship.x - bw/2);
  const by = Math.round(ship.y - 24);
  const pct = ship.hp / MAX_HP;
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = pct > 0.5 ? PAL.hp100 : pct > 0.25 ? PAL.hp50 : PAL.hp25;
  ctx.fillRect(bx, by, Math.round(bw * pct), bh);
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  // Name tag
  ctx.fillStyle = isMe ? '#00ff41' : '#aaaaaa';
  ctx.font = '5px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText((ship.name || '').substring(0,10), Math.round(ship.x), by - 3);
  ctx.textAlign = 'left';
}

// ══════════════════════════════════════════════
//  BULLETS
// ══════════════════════════════════════════════
function drawBullets(bullets) {
  for (const b of bullets) {
    ctx.fillStyle = PAL.bulletGlow;
    ctx.fillRect(Math.round(b.x)-4, Math.round(b.y)-4, 8, 8);
    ctx.fillStyle = PAL.bullet;
    ctx.fillRect(Math.round(b.x)-2, Math.round(b.y)-2, 4, 4);
  }
}

// ══════════════════════════════════════════════
//  POWER-UPS
// ══════════════════════════════════════════════
function drawPowerups(pus, frame) {
  for (const pu of pus) {
    const pulse = Math.sin(frame * 0.08) * 0.4 + 0.6;
    const col   = PAL.powerup[pu.type] || '#fff';
    ctx.save();
    ctx.translate(Math.round(pu.x), Math.round(pu.y));
    ctx.globalAlpha = pulse * 0.5;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 14 + Math.sin(frame*0.08)*2, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#0a0a0f';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.fillRect(-9,-9,18,18);
    ctx.strokeRect(-9,-9,18,18);
    ctx.fillStyle = col;
    if (pu.type === 'shield') {
      ctx.fillRect(-4,-5,8,2); ctx.fillRect(-5,-3,10,2);
      ctx.fillRect(-4,-1,8,2); ctx.fillRect(-3,1,6,2); ctx.fillRect(-2,3,4,2);
    } else if (pu.type === 'rapid') {
      ctx.fillRect(1,-6,3,5); ctx.fillRect(-3,-1,8,2); ctx.fillRect(-4,1,3,5);
    } else {
      ctx.fillRect(-5,-2,3,3); ctx.fillRect(-1,-2,3,3); ctx.fillRect(3,-2,3,3);
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function spawnExplosion(x, y, big=false) {
  const count = big ? 20 : 10;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * (big ? 4 : 2.5);
    particles.push({
      x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1,
      decay: 0.03 + Math.random()*0.04,
      size: big ? (2+Math.random()*4) : (1+Math.random()*2),
      color: PAL.explosion[Math.floor(Math.random()*PAL.explosion.length)],
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= p.decay;
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    const s = Math.ceil(p.size);
    ctx.fillRect(Math.round(p.x-s/2), Math.round(p.y-s/2), s, s);
  }
  ctx.globalAlpha = 1;
}

// Track previous ship HP to detect damage for local explosions
let prevHP = {};

// ══════════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════════
function updateHUD(me) {
  const pct = me.hp / MAX_HP;
  const bar = document.getElementById('hudHP');
  bar.style.width = (pct*100).toFixed(1)+'%';
  bar.className = 'health-bar' + (pct<=0.25?' low':pct<=0.5?' mid':'');
  document.getElementById('hudHPVal').textContent = me.hp + ' / ' + MAX_HP;

  const puEl = document.getElementById('hudPU');
  if (!me.inventory.length && !me.activeShield && !me.activeRapid && !me.activeTriple) {
    puEl.textContent = '—';
  } else {
    let html = '';
    for (let i = 0; i < 3; i++) {
      const pu  = me.inventory[i];
      const col = pu ? PAL.powerup[pu] : '#2a5a2a';
      html += `<span class="powerup-slot ${pu?'active':''}" style="border-color:${col};color:${col}">${pu ? PU_ICONS[pu] : i+1}</span>`;
    }
    if (me.activeShield>0) html += ` <span style="color:${PAL.powerup.shield}">🛡${Math.ceil(me.activeShield/60)}s</span>`;
    if (me.activeRapid >0) html += ` <span style="color:${PAL.powerup.rapid}">⚡${Math.ceil(me.activeRapid/60)}s</span>`;
    if (me.activeTriple>0) html += ` <span style="color:${PAL.powerup.triple}">🔱${Math.ceil(me.activeTriple/60)}s</span>`;
    puEl.innerHTML = html;
  }
}

function updateScoreboard(ships) {
  const sb = document.getElementById('scoreboard');
  const sorted = [...ships].sort((a,b) => b.kills - a.kills);
  sb.innerHTML = sorted.map(s => {
    const cls = (s.id===myId?'me ':'') + (s.dead?'dead ':'');
    return `<div class="sb-row ${cls}">
      <span class="sb-name" style="color:${COLORS[s.colorIdx]||'#888'}">${s.name}</span>
      <span>${s.kills}K</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  GAME LOOP (render only)
// ══════════════════════════════════════════════
function gameLoop() {
  animId = requestAnimationFrame(gameLoop);
  if (!gameState || !waterCanvas) return;

  waterFrame++;
  const { ships, bullets, powerups, frame } = gameState;

  // Detect explosions from HP drops
  for (const s of ships) {
    const prev = prevHP[s.id];
    if (prev !== undefined && s.hp < prev) {
      spawnExplosion(s.x, s.y, s.hp <= 0);
    }
    if (s.dead && prev !== undefined && prev > 0) {
      spawnExplosion(s.x, s.y, true);
    }
    prevHP[s.id] = s.hp;
  }

  updateParticles();
  drawWater(waterFrame);
  drawClouds(waterFrame);
  drawPowerups(powerups, frame);
  drawBullets(bullets);
  for (const s of ships) drawShip(s, frame);
  drawParticles();
  drawSeagulls(waterFrame);

  const me = ships.find(s => s.id === myId);
  if (me) { updateHUD(me); }
  updateScoreboard(ships);
}

function startLoop() {
  if (!animId) animId = requestAnimationFrame(gameLoop);
}
function stopLoop() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

// ══════════════════════════════════════════════
//  INPUT SENDER (60fps)
// ══════════════════════════════════════════════
let inputInterval = null;

function startInputLoop() {
  if (inputInterval) return;
  inputInterval = setInterval(() => {
    if (!myId) return;
    send({
      type:    'input',
      left:    !!(keysDown['a'] || keysDown['arrowleft']),
      right:   !!(keysDown['d'] || keysDown['arrowright']),
      forward: !!(keysDown['w'] || keysDown['arrowup']),
      back:    !!(keysDown['s'] || keysDown['arrowdown']),
      fire:    !!keysDown[' '],
    });
  }, 1000/60);
}

function stopInputLoop() {
  if (inputInterval) { clearInterval(inputInterval); inputInterval = null; }
}

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  keysDown[e.key.toLowerCase()] = true;

  if (e.key === '1') send({ type:'input', use1:true });
  if (e.key === '2') send({ type:'input', use2:true });
  if (e.key === '3') send({ type:'input', use3:true });
});
document.addEventListener('keyup', e => { keysDown[e.key.toLowerCase()] = false; });
window.addEventListener('keydown', e => {
  if ([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});

// ══════════════════════════════════════════════
//  TOUCH
// ══════════════════════════════════════════════
let touchStart = { x: 0, y: 0 };
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart.x = t.clientX; touchStart.y = t.clientY;
  keysDown[' '] = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t  = e.touches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const th = 20;
  keysDown['w'] = dy < -th;
  keysDown['s'] = dy >  th;
  keysDown['a'] = dx < -th;
  keysDown['d'] = dx >  th;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  ['w','s','a','d',' '].forEach(k => keysDown[k] = false);
}, { passive: false });

// ══════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(id) {
  ['joinScreen','lobbyScreen','gameOverScreen','winScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ══════════════════════════════════════════════
//  KILL FEED
// ══════════════════════════════════════════════
function addKillMsg(msg, color='#ffaa00') {
  const feed = document.getElementById('kill-feed');
  const el = document.createElement('div');
  el.className = 'kill-msg';
  el.textContent = msg;
  el.style.borderColor = color;
  el.style.color = color;
  feed.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ══════════════════════════════════════════════
//  BUTTONS
// ══════════════════════════════════════════════
document.getElementById('btnJoin').onclick = () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('joinError').textContent = 'Enter a ship name!'; return; }
  document.getElementById('joinError').textContent = '';
  send({ type: 'join', name });
  startInputLoop();
};

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnJoin').click();
});

document.getElementById('btnStart').onclick = () => {
  send({ type: 'startGame' });
};

document.getElementById('btnReplay').onclick = () => {
  send({ type: 'restartLobby' });
};

document.getElementById('btnWinLobby').onclick = () => {
  send({ type: 'restartLobby' });
};

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
showScreen('joinScreen');
connect();
</script>
